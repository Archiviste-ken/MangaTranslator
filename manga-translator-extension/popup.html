<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Translator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      overflow-x: hidden;
    }

    .popup-header {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
    }

    .popup-header svg {
      width: 28px;
      height: 28px;
      color: #e94560;
      flex-shrink: 0;
    }

    .popup-header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.25px;
    }

    .popup-header .version {
      font-size: 10px;
      color: #a0a0b0;
      margin-left: auto;
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .popup-body { padding: 16px; }

    .popup-section {
      margin-bottom: 16px;
    }

    .popup-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e94560;
      margin-bottom: 10px;
    }

    .popup-field {
      margin-bottom: 12px;
    }

    .popup-field label {
      display: block;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 4px;
    }

    .popup-field select,
    .popup-field input[type="text"],
    .popup-field input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #eaeaea;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .popup-field select:focus,
    .popup-field input:focus {
      border-color: #e94560;
    }

    .popup-field select option {
      background: #16213e;
      color: #eaeaea;
    }

    .popup-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .popup-checkbox input[type="checkbox"] {
      accent-color: #e94560;
      width: 16px;
      height: 16px;
    }

    .popup-checkbox label {
      font-size: 13px;
      color: #eaeaea;
      cursor: pointer;
    }

    .popup-lang-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .popup-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .popup-btn-primary {
      background: linear-gradient(135deg, #e94560, #c93050);
      color: white;
    }

    .popup-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
    }

    .popup-btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #a0a0b0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .popup-btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #eaeaea;
    }

    .popup-btn-outline {
      background: transparent;
      color: #e94560;
      border: 1px solid rgba(233, 69, 96, 0.3);
    }

    .popup-btn-outline:hover {
      background: rgba(233, 69, 96, 0.1);
    }

    .popup-status {
      display: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      text-align: center;
    }

    .popup-status-success {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .popup-status-error {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .popup-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 16px 0;
    }

    .popup-footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #666;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .popup-footer a {
      color: #e94560;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 5h7"/>
      <path d="M9 3v2c0 4.418-2.239 8-5 8"/>
      <path d="M5 9c.003 2.144 1.277 4.182 3 5.5"/>
      <path d="M12 21l3.5-7 3.5 7"/>
      <path d="M13.5 18h5"/>
    </svg>
    <h1>Manga Translator</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div class="popup-body">
    <div id="status" class="popup-status"></div>

    <!-- Translate Button -->
    <button id="translateBtn" class="popup-btn popup-btn-primary">
      ⚡ Translate Current Page
    </button>

    <hr class="popup-divider">

    <!-- Translation Provider -->
    <div class="popup-section">
      <div class="popup-section-title">Translation Provider</div>

      <div class="popup-field">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="openai">OpenAI (GPT)</option>
          <option value="google">Google Translate</option>
          <option value="deepl">DeepL</option>
          <option value="backend">Local Backend</option>
        </select>
      </div>

      <div class="popup-field" id="apiKeyGroup">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="Enter your API key">
      </div>

      <div class="popup-field" id="backendUrlGroup" style="display:none">
        <label for="backendUrl">Backend URL</label>
        <input type="text" id="backendUrl" placeholder="http://localhost:3000">
      </div>

      <div class="popup-field" id="modelGroup">
        <label for="model">Model</label>
        <select id="model">
          <option value="gpt-4o-mini">GPT-4o Mini (fast)</option>
          <option value="gpt-4o">GPT-4o (accurate)</option>
          <option value="gpt-4-turbo">GPT-4 Turbo</option>
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo (cheapest)</option>
        </select>
      </div>

      <div class="popup-field">
        <label for="targetLang">Target Language</label>
        <select id="targetLang">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
          <option value="zh">Chinese</option>
          <option value="ko">Korean</option>
          <option value="ja">Japanese</option>
        </select>
      </div>
    </div>

    <hr class="popup-divider">

    <!-- OCR Settings -->
    <div class="popup-section">
      <div class="popup-section-title">OCR Settings</div>

      <div class="popup-checkbox">
        <input type="checkbox" id="autoDetect" checked>
        <label for="autoDetect">Auto-detect source language</label>
      </div>

      <div class="popup-field">
        <label>OCR Languages (when auto-detect is off)</label>
        <div class="popup-lang-grid">
          <div class="popup-checkbox">
            <input type="checkbox" name="ocrLang" value="jpn" checked>
            <label>Japanese</label>
          </div>
          <div class="popup-checkbox">
            <input type="checkbox" name="ocrLang" value="kor" checked>
            <label>Korean</label>
          </div>
          <div class="popup-checkbox">
            <input type="checkbox" name="ocrLang" value="chi_sim" checked>
            <label>Chinese</label>
          </div>
        </div>
      </div>
    </div>

    <hr class="popup-divider">

    <!-- Cache & Performance -->
    <div class="popup-section">
      <div class="popup-section-title">Performance</div>

      <div class="popup-checkbox">
        <input type="checkbox" id="cacheEnabled" checked>
        <label for="cacheEnabled">Cache translations</label>
      </div>

      <button id="clearCacheBtn" class="popup-btn popup-btn-outline">
        🗑️ Clear Translation Cache
      </button>
    </div>

    <!-- Save -->
    <button id="saveBtn" class="popup-btn popup-btn-secondary">
      💾 Save Settings
    </button>
  </div>

  <div class="popup-footer">
    Manga Translator &middot; Built with ❤️
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
